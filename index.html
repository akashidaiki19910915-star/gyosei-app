<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Services MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <h1>Administrative Services</h1>
      <p>Fast request tracking for daily admin work.</p>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>New Request</h2>
        <form id="request-form" class="form">
          <label>
            Requester
            <input id="requester" name="requester" type="text" required maxlength="60" />
          </label>

          <label>
            Service Type
            <select id="service" name="service" required>
              <option value="">Select a service</option>
              <option>Document Processing</option>
              <option>Scheduling</option>
              <option>Travel Approval</option>
              <option>Facilities Support</option>
            </select>
          </label>

          <label>
            Notes
            <textarea id="notes" name="notes" rows="4" maxlength="300" placeholder="Short context..."></textarea>
          </label>

          <button type="submit">Add Request</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>Open Requests</h2>
          <button id="clear-btn" type="button" class="ghost-btn">Clear All</button>
        </div>

        <div id="empty-state" class="empty">No requests yet.</div>
        <ul id="request-list" class="request-list" aria-live="polite"></ul>
      </section>
    </main>

    <template id="request-template">
      <li class="request-item">
        <div class="request-meta">
          <strong class="requester"></strong>
          <span class="service"></span>
          <small class="created"></small>
        </div>
        <p class="notes"></p>
        <button class="done-btn" type="button">Mark Done</button>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
